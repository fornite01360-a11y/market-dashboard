<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Crypto Terminal</title>
<script src="https://s3.tradingview.com/tv.js"></script>
<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0f0c;
    color:white;
}
.sidebar{
    width:70px;
    background:#0f1512;
    height:100vh;
    position:fixed;
}
.main{
    margin-left:70px;
    padding:20px;
}
.topbar{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}
.card{
    background:#111917;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
}
.green{color:#00ff9c}
.button{
    background:#00ff9c;
    color:black;
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
input{
    width:100%;
    padding:10px;
    margin:5px 0;
    background:#0b0f0c;
    border:1px solid #1c2a25;
    color:white;
}
</style>
</head>

<body>

<div class="sidebar"></div>

<div class="main">

<div class="topbar">
    <h2>Crypto Terminal</h2>
    <div>Balance: $<span id="balance">10000</span></div>
</div>

<div class="card">
    <div id="chart" style="height:400px;"></div>
</div>

<div class="card">
    <h3>Trade</h3>
    <input id="amount" placeholder="Montant USD">
    <button class="button" onclick="buy()">Long</button>
    <button class="button" onclick="sell()">Short</button>
</div>

<div class="card">
    <h3>Positions</h3>
    <div id="positions"></div>
</div>

</div>

<script>
// TradingView
new TradingView.widget({
    "container_id": "chart",
    "symbol": "BINANCE:BTCUSDT",
    "interval": "15",
    "theme": "dark",
    "style": "1",
    "locale": "fr",
    "hide_top_toolbar": false
});

// DATA
let balance = localStorage.getItem("balance") || 10000;
let positions = JSON.parse(localStorage.getItem("positions") || "[]");

function update(){
    document.getElementById("balance").innerText = balance;
    let html="";
    positions.forEach(p=>{
        html += `<div>${p.type} $${p.amount}</div>`;
    });
    document.getElementById("positions").innerHTML = html;

    localStorage.setItem("balance", balance);
    localStorage.setItem("positions", JSON.stringify(positions));
}

function buy(){
    let amount = document.getElementById("amount").value;
    if(amount > balance) return alert("Pas assez de balance");

    balance -= amount;
    positions.push({type:"LONG", amount:amount});
    update();
}

function sell(){
    let amount = document.getElementById("amount").value;
    if(amount > balance) return alert("Pas assez de balance");

    balance -= amount;
    positions.push({type:"SHORT", amount:amount});
    update();
}

update();
</script>

</body>
</html>
